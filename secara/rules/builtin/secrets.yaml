rules:
  - id: SEC001
    name: "Hardcoded AWS Access Key ID"
    severity: HIGH
    description: "Hardcoded AWS Access Key ID detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "(?<![A-Z0-9])AKIA[0-9A-Z]{16}(?![A-Z0-9])"
  - id: SEC001B
    name: "Hardcoded AWS Secret Access Key"
    severity: HIGH
    description: "Hardcoded AWS Secret Access Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "(?i)aws[_\\-\\s]?secret[_\\-\\s]?(?:access[_\\-\\s]?)?key['\\\":\\s=]+[A-Za-z0-9/+=]{40}"
  - id: SEC002
    name: "Hardcoded GitHub Personal Access Token"
    severity: HIGH
    description: "Hardcoded GitHub Personal Access Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "ghp_[a-zA-Z0-9]{30,}"
  - id: SEC003
    name: "Hardcoded GitHub OAuth Token"
    severity: HIGH
    description: "Hardcoded GitHub OAuth Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "gho_[a-zA-Z0-9]{30,}"
  - id: SEC004
    name: "Hardcoded GitHub Actions Token"
    severity: HIGH
    description: "Hardcoded GitHub Actions Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "ghs_[a-zA-Z0-9]{30,}"
  - id: SEC004B
    name: "Hardcoded GitHub Fine-Grained Token"
    severity: HIGH
    description: "Hardcoded GitHub Fine-Grained Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "github_pat_[a-zA-Z0-9\\_]{50,}"
  - id: SEC004C
    name: "Hardcoded GitLab Personal Access Token"
    severity: HIGH
    description: "Hardcoded GitLab Personal Access Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "glpat-[a-zA-Z0-9\\-_]{20}"
  - id: SEC005
    name: "Hardcoded Stripe Live Secret Key"
    severity: HIGH
    description: "Hardcoded Stripe Live Secret Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sk_live_[0-9a-zA-Z]{15,}"
  - id: SEC006
    name: "Hardcoded Stripe Test Key"
    severity: MEDIUM
    description: "Hardcoded Stripe Test Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sk_test_[0-9a-zA-Z]{15,}"
  - id: SEC007
    name: "Hardcoded Slack Token"
    severity: HIGH
    description: "Hardcoded Slack Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "xox[baprs]-[0-9a-zA-Z\\-]{10,}"
  - id: SEC007B
    name: "Hardcoded Slack Webhook URL"
    severity: HIGH
    description: "Hardcoded Slack Webhook URL detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "hooks\\.slack\\.com/services/[A-Za-z0-9/]{30,}"
  - id: SEC008
    name: "Hardcoded Private Key Header"
    severity: HIGH
    description: "Hardcoded Private Key Header detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
  - id: SEC009
    name: "Hardcoded SendGrid API Key"
    severity: HIGH
    description: "Hardcoded SendGrid API Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "SG\\.[a-zA-Z0-9]{22}\\.[a-zA-Z0-9]{43}"
  - id: SEC010
    name: "Hardcoded Google API Key"
    severity: HIGH
    description: "Hardcoded Google API Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "AIza[0-9A-Za-z\\-_]{30,}"
  - id: SEC010B
    name: "Hardcoded Google OAuth Client Secret"
    severity: HIGH
    description: "Hardcoded Google OAuth Client Secret detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "GOCSPX-[a-zA-Z0-9\\-_]{20,}"
  - id: SEC010C
    name: "Hardcoded GCP Service Account Key (JSON)"
    severity: HIGH
    description: "Hardcoded GCP Service Account Key (JSON) detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "\"private_key_id\"\\s*:\\s*\"[a-f0-9]{30,}"
  - id: SEC010D
    name: "Hardcoded Firebase Database URL"
    severity: MEDIUM
    description: "Hardcoded Firebase Database URL detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "https://[a-z0-9\\-]+\\.firebaseio\\.com"
  - id: SEC011
    name: "Hardcoded Twilio Account SID"
    severity: MEDIUM
    description: "Hardcoded Twilio Account SID detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "AC[a-z0-9]{32}"
  - id: SEC011B
    name: "Hardcoded Twilio Auth Token"
    severity: HIGH
    description: "Hardcoded Twilio Auth Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "(?i)twilio[_\\-\\s]?auth[_\\-\\s]?token['\\\":\\s=]+[a-z0-9]{32}"
  - id: SEC012
    name: "Hardcoded JWT Token"
    severity: HIGH
    description: "Hardcoded JWT Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "eyJ[A-Za-z0-9\\-_]+\\.[A-Za-z0-9\\-_]+\\.[A-Za-z0-9\\-_]+"
  - id: SEC015
    name: "Hardcoded OpenAI API Key"
    severity: HIGH
    description: "Hardcoded OpenAI API Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sk-[a-zA-Z0-9]{30,}"
  - id: SEC015B
    name: "Hardcoded OpenAI Project/Org Key"
    severity: HIGH
    description: "Hardcoded OpenAI Project/Org Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sk-proj-[a-zA-Z0-9\\-_]{40,}"
  - id: SEC016
    name: "Hardcoded Anthropic API Key"
    severity: HIGH
    description: "Hardcoded Anthropic API Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sk-ant-[a-zA-Z0-9\\-_]{40,}"
  - id: SEC017
    name: "Hardcoded Azure Storage Account Key"
    severity: HIGH
    description: "Hardcoded Azure Storage Account Key detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{80,}"
  - id: SEC017B
    name: "Hardcoded Azure SAS Token"
    severity: HIGH
    description: "Hardcoded Azure SAS Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "sv=\\d{4}-\\d{2}-\\d{2}&s[a-z]=\\w+&sig=[A-Za-z0-9+/%]{30,}"
  - id: SEC018
    name: "Hardcoded npm Auth Token"
    severity: HIGH
    description: "Hardcoded npm Auth Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "npm_[a-zA-Z0-9]{30,}"
  - id: SEC019
    name: "Hardcoded Cloudflare API Token"
    severity: HIGH
    description: "Hardcoded Cloudflare API Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "(?i)cloudflare.{0,30}['\\\":\\s=]+[A-Za-z0-9_\\-]{30,}"
  - id: SEC020
    name: "Hardcoded Telegram Bot Token"
    severity: HIGH
    description: "Hardcoded Telegram Bot Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "\\d{8,10}:[A-Za-z0-9_-]{35}"
  - id: SEC021
    name: "Hardcoded Discord Bot Token"
    severity: HIGH
    description: "Hardcoded Discord Bot Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "[MN][a-zA-Z0-9]{23}\\.[a-zA-Z0-9\\-_]{6}\\.[a-zA-Z0-9\\-_]{27}"
  - id: SEC022
    name: "Hardcoded Heroku API Key"
