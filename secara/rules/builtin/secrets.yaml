    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
  - id: SEC023
    name: "Hardcoded Mailgun API Key"
