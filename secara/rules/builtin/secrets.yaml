      regex: "key-[0-9a-zA-Z]{32}"
  - id: SEC024
    name: "Hardcoded PyPI Token"
    severity: HIGH
    description: "Hardcoded PyPI Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "pypi-AgEIcHlwaS5vcmc[a-zA-Z0-9\\-_]{100,}"
  - id: SEC025
    name: "Hardcoded HuggingFace API Token"
    severity: HIGH
    description: "Hardcoded HuggingFace API Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
