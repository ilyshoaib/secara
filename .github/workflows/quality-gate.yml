name: "Quality Gate"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  tests-and-quality:
    name: Tests and Accuracy Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests (includes benchmark quality gate)
        run: pytest -q

      - name: Generate quality report and enforce regression budget
        run: |
          python -m secara.cli quality-report \
            --json-output artifacts/quality_report.json \
            --md-output artifacts/quality_report.md \
            --enforce-budget \
            --baseline-file .github/quality_baseline.json \
            --budget-file .github/quality_budget.json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secara-quality-report
          path: artifacts/
