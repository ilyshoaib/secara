      regex: "dapi[a-z0-9]{32}"
  - id: SEC027
    name: "Hardcoded Okta API Token"
    severity: HIGH
    description: "Hardcoded Okta API Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "00[a-zA-Z0-9\\-_]{40}"
  - id: SEC028
    name: "Hardcoded HashiCorp Vault Token"
    severity: HIGH
    description: "Hardcoded HashiCorp Vault Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "hvs\\.[a-zA-Z0-9]{24}"
  - id: SEC029
    name: "Hardcoded Shopify Access Token"
    severity: HIGH
    description: "Hardcoded Shopify Access Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "shpat_[a-fA-F0-9]{32}"
  - id: SEC029B
    name: "Hardcoded Shopify Private App Password"
    severity: HIGH
    description: "Hardcoded Shopify Private App Password detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "shpss_[a-fA-F0-9]{32}"
  - id: SEC030
    name: "Hardcoded Braintree Access Token"
    severity: HIGH
    description: "Hardcoded Braintree Access Token detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "access_token\\$production\\$[0-9a-z]{16}\\$[0-9a-f]{32}"
  - id: SEC031
    name: "Hardcoded Database Connection String"
    severity: HIGH
    description: "Hardcoded Database Connection String detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "(?:postgres|mysql|mongodb|mssql|redis|amqp)(?:\\+\\w+)?://[^:'\\\"\\s]+:[^@'\\\"\\s]+@"
  - id: SEC031B
    name: "Hardcoded SSH Private Key (inline)"
    severity: HIGH
    description: "Hardcoded SSH Private Key (inline) detected."
    fix: "Remove the hardcoded secret and use environment variables or a secure vault."
    languages: ["any"]
    pattern:
      type: "regex"
      regex: "-----BEGIN OPENSSH PRIVATE KEY-----"