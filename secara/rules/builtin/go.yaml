rules:
  # ── SQL Injection ────────────────────────────────────────────────────────
  - id: SQL005
    name: "SQL Injection via String Concatenation (Go)"
    severity: HIGH
    cwe: "CWE-89"
    references:
      - https://owasp.org/www-community/attacks/SQL_Injection
      - https://cwe.mitre.org/data/definitions/89.html
    description: "A database query is constructed dynamically using string formatting or concatenation. Use parameterized queries instead."
    fix: "Use parameterized queries: db.Query('SELECT * FROM users WHERE id = ?', id)"
    languages: ["go"]
    pattern_type: "regex"
    pattern:
      regex: "(?ix)(?:db\\.|tx\\.)(?:Query|QueryRow|Exec|Prepare|ExecContext|QueryContext)\\s*\\(.*?(?:fmt\\.Sprintf\\s*\\(|(?:\\w+\\s*\\+\\s*)+|\\+\\s*\\w+)"

  # ── Command Injection (OS) ────────────────────────────────────────────────
  - id: CMD005
    name: "Command Injection via exec.Command (Go)"
    severity: HIGH
    cwe: "CWE-78"
    references:
      - https://owasp.org/www-community/attacks/Command_Injection
      - https://cwe.mitre.org/data/definitions/78.html
    description: "exec.Command is used with 'sh -c' and dynamic input, allowing arbitrary command execution."
    fix: "Use exec.Command('ls', '-la', userDir) instead of executing sh/bash with user-controlled arguments."
    languages: ["go"]
    pattern_type: "regex"
    pattern:
      regex: "(?ix)exec\\.Command(?:Context)?\\s*\\(\\s*(?:[\"'`]sh[\"'`]\\s*,\\s*[\"'`]-c[\"'`]|[\"'`]bash[\"'`]\\s*,\\s*[\"'`]-c[\"'`]|[\"'`]cmd[\"'`]\\s*,\\s*[\"'`]/c[\"'`])\\s*,[^)]*?(?:[a-zA-Z0-9_\\-]+|\\(.*?\\))\\s*\\)"

  # ── SSRF ─────────────────────────────────────────────────────────────────
  - id: SSRF003
    name: "Server-Side Request Forgery / SSRF (Go)"
    severity: HIGH
    cwe: "CWE-918"
    references:
      - https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      - https://cwe.mitre.org/data/definitions/918.html
    description: "http.Get or similar method is called with a dynamically constructed URL. Validate user-provided URLs against an allowlist."
    fix: "Validate and allowlist URLs before making outbound HTTP requests."
    languages: ["go"]
    pattern_type: "regex"
    pattern:
      regex: "(?ix)http\\.(?:Get|Post|Head|Do)\\s*\\(\\s*(?:[a-zA-Z0-9_]+(?:\\.URL|\\.String\\(\\))?|(?:fmt\\.Sprintf\\s*\\([^)]+\\)))\\s*\\)"

  # ── Path Traversal ───────────────────────────────────────────────────────
  - id: PATH004
    name: "Path Traversal (Go)"
    severity: MEDIUM
    cwe: "CWE-22"
    references:
      - https://owasp.org/www-community/attacks/Path_Traversal
      - https://cwe.mitre.org/data/definitions/22.html
    description: "File operation with a path variable derived from user-controlled request input."
    fix: "Use filepath.Clean() and verify the result starts with a permitted base directory."
    languages: ["go"]
    pattern_type: "regex"
    pattern:
      regex: "(?ix)os\\.(?:Open|OpenFile|ReadFile|WriteFile|Remove|RemoveAll)\\s*\\(\\s*[^)]*(?:req\\.|r\\.|ctx\\.|c\\.|body|query|param|input)"
